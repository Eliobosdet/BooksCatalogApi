<div class="form-container">
    <h2>Add a New Book</h2>
    <form [formGroup]="bookForm" (ngSubmit)="OnSubmit()">
        <div class="field">
            <label for="title">Title:</label>
            <input type="text" id="title" formControlName="title" placeholder="Enter book title">
        </div>

        <div class="field">
            <label for="title">Author:</label>
            <input type="text" id="author" formControlName="author" placeholder="Enter book author">
        </div>

        <div class="field">
            <label for="title">publicationYear:</label>
            <input type="text" id="publicationYear" formControlName="publicationYear" placeholder="Enter publication year">
        </div>

        <button type="submit" [disabled]="bookForm.invalid">Insert Book</button>

    </form>
</div>
